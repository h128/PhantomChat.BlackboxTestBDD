name: phantomchat-blackbox-bdd

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Validate Behave suite
        run: python -m behave --dry-run

  run-blackbox-tests:
    runs-on: ubuntu-latest
    needs: validate-suite
    if: ${{ vars.PHANTOMCHAT_HTTP_BASE_URL != '' && vars.PHANTOMCHAT_WS_URL != '' }}
    env:
      PHANTOMCHAT_HTTP_BASE_URL: ${{ vars.PHANTOMCHAT_HTTP_BASE_URL }}
      PHANTOMCHAT_WS_URL: ${{ vars.PHANTOMCHAT_WS_URL }}
      PHANTOMCHAT_VERIFY_TLS: ${{ vars.PHANTOMCHAT_VERIFY_TLS || 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Run black-box integration tests
        run: python -m behave --junit --junit-directory test-results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: behave-results
          path: test-results
